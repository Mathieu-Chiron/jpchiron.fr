<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jean-Pierre Chiron — Écrivain</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Trocchi&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --cream: #f0ead8;
      --muted: rgba(240,234,216,0.75);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;

      /* Placeholder noir — remplacez background-color par background-image: url('votre-photo.jpg') */
      background-color: #0a0a0a;
      background-image:
        /* Dégradé sombre par-dessus la future photo */
        linear-gradient(
          to bottom,
          rgba(0,0,0,0.55) 0%,
          rgba(0,0,0,0.35) 40%,
          rgba(0,0,0,0.65) 100%
        );
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      color: var(--cream);
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: flex-end;
      gap: 40px;
      padding: 36px 56px;
      list-style: none;
    }

    nav a {
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding-bottom: 3px;
      border-bottom: 1px solid transparent;
      transition: color 0.25s, border-color 0.25s;
    }

    nav a:hover {
      color: var(--cream);
      border-bottom-color: var(--gold);
    }

    /* HERO */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .name {
      font-family: 'Trocchi', serif;
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--cream);
      opacity: 0;
      animation: fadeUp 1.2s 0.3s ease forwards;
    }

    .tagline {
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-top: 14px;
      opacity: 0;
      animation: fadeUp 1.2s 0.6s ease forwards;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 28px auto;
      opacity: 0;
      animation: fadeIn 1s 0.9s ease forwards;
    }

    /* CTA lien romans */
    .cta {
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding-bottom: 3px;
      border-bottom: 1px solid transparent;
      transition: color 0.25s, border-color 0.25s;
      opacity: 0;
      animation: fadeUp 1.2s 1.1s ease forwards;
    }
    .cta:hover {
      color: var(--cream);
      border-bottom-color: var(--gold);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 28px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(240,234,216,0.45);
    }

    @media (max-width: 600px) {
      nav { padding: 24px 28px; gap: 24px; }
      main { padding: 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="monde-de-jp.html">Le monde de JP</a>
    <a href="actualites.html">Actualités</a>
    <a href="romans.html">Romans</a>
  </nav>

  <main>
    <h1 class="name">Jean-Pierre CHIRON</h1>
    <p class="tagline">écrivain lyonnais de polars noirs</p>
    <div class="divider"></div>
    <a class="cta" href="romans.html">Découvrir les romans</a>
  </main>

  <footer>
    &copy; Jean-Pierre Chiron
  </footer>

</body>
</html>
